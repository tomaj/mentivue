# Local development infrastructure
# Usage: pnpm docker:up (from repo root)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mentivue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mentivue
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: mentivue
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mentivue']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mentivue-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Local SMTP catcher — Mailpit web UI at http://localhost:8025
  # SMTP listens on :1025 (no auth). All app emails land here in dev.
  mailpit:
    image: axllent/mailpit:latest
    container_name: mentivue-mailpit
    restart: unless-stopped
    # Non-default host ports (1025 / 8025 collide with another app on this Mac).
    ports:
      - '11025:1025'  # SMTP   → http://localhost:11025 (no UI here)
      - '18025:8025'  # web UI → http://localhost:18025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
